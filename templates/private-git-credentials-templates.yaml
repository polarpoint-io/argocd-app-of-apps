{{- range $repo := .Values.privateGitCredentialsTemplates  }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $repo.name }}-git-repo-creds-tpl
  namespace: {{ $.Values.global.namespace}}
data:
  url: {{ $repo.url }}
  type: git
  sshPrivateKey: "{{`{{.sshPrivateKey | toString}}`}}"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $repo.name }}-git-repo-creds
  namespace: {{ $.Values.global.namespace}}
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    name: {{ (($.Values.global.secretStore).name) | default "cluster-secrets-store" }}
    kind: ClusterSecretStore
  target:
    name: {{ $repo.name }}-git-repo-creds
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: "repo-creds"
      templateFrom:
      - configMap:
          # name of the configmap to pull in
          name: {{ $repo.name }}-git-repo-creds-tpl
          # here you define the keys that should be used as template
          items:
          - key: url
          - key: type
          - key: sshPrivateKey

  data:
    - secretKey: sshPrivateKey
      remoteRef:
        key: github-credentials
        property: github-ssh-access-private-key

{{- end }}